# Converted from Loon config for Clash / Clash.Meta / Mihomo.
#
# Notes:
# - Loon MITM ca-p12 / ca-passphrase is not supported by standard Clash config.
# - Loon Plugin / Rewrite / Script sections are not directly supported here.
# - Loon Remote Filter has no direct Clash equivalent; the local proxy is modeled
#   as a normal proxy and selected through the Available group.
# - The ddgkdsf2013 AI remote rule list has been expanded into local rules.

mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false

external-controller: 127.0.0.1:9090

profile:
  store-selected: true
  store-fake-ip: true

tcp-concurrent: true

dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:1053
  enhanced-mode: redir-host
  nameserver:
    - system
    - 119.29.29.29
    - 114.114.114.114
    - 223.5.5.5

tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  strict-route: false
  route-exclude-address:
    - 10.0.0.0/8
    - 100.64.0.0/10
    - 127.0.0.0/8
    - 169.254.0.0/16
    - 172.16.0.0/12
    - 192.0.0.0/24
    - 192.0.2.0/24
    - 192.88.99.0/24
    - 192.168.0.0/16
    - 198.51.100.0/24
    - 203.0.113.0/24
    - 224.0.0.0/4
    - 255.255.255.255/32

proxies:
  - name: Proxy Cheap
    type: socks5
    server: YOUR_PROXY_SERVER
    port: 1080
    username: YOUR_PROXY_USERNAME
    password: YOUR_PROXY_PASSWORD
    udp: true
    ip-version: ipv4

proxy-groups:
  - name: Available
    type: select
    proxies:
      - Proxy Cheap
      - DIRECT

rules:
  # Local / private networks from Loon skip-proxy and bypass-tun.
  - IP-CIDR,192.168.0.0/16,DIRECT,no-resolve
  - IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
  - IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
  - DOMAIN,localhost,DIRECT
  - DOMAIN-SUFFIX,local,DIRECT
  - DOMAIN,e.crashlynatics.com,DIRECT

  # --- 1. Google Basics ---
  # 覆盖登录、验证、基础静态资源，防止 IP 撕裂
